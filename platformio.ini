; ============================================================
;  Growatt SHINE WiFi X  –  ESP8266 Firmware
;  PlatformIO configuration
;
;  DEPLOYMENT: nur "pio run --target upload"
;  Das Webinterface (index.html) ist direkt in der Firmware
;  eingebettet (PROGMEM, gzip). Kein "uploadfs" notwendig.
; ============================================================
[env:nodemcuv2]
platform  = espressif8266
board     = nodemcuv2
framework = arduino

; ---------- Upload / Monitor ----------
monitor_speed    = 115200
upload_speed     = 921600

; ---------- Filesystem (nur für config.json) ----------
board_build.filesystem = littlefs

; ---------- Build flags ----------
build_flags =
    -D ARDUINO_ESP8266_NODEMCU
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ---------- Libraries ----------
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0.4
    esphome/ESPAsyncTCP-esphome @ ^2.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.0.0
